<svg width="660" height="150" viewBox="0 0 660 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Start Event -->
  <circle cx="50" cy="75" r="22" stroke="#4184F3" stroke-width="3" fill="#fff"/>
  <text x="21" y="80" font-size="11" font-family="Arial" fill="#333">Mulai</text>
  <!-- Login Task -->
  <rect x="90" y="48" width="120" height="54" rx="10" fill="#D9EFFF" stroke="#4184F3" stroke-width="2"/>
  <text x="100" y="80" font-size="13" font-family="Arial" fill="#333">Login Aplikasi</text>
  <!-- Menu Tarif Sewa Task -->
  <rect x="240" y="48" width="160" height="54" rx="10" fill="#D9EFFF" stroke="#4184F3" stroke-width="2"/>
  <text x="250" y="80" font-size="13" font-family="Arial" fill="#333">Pilih Menu Tarif Sewa</text>
  <!-- Lihat Daftar Tarif Sewa Task -->
  <rect x="420" y="48" width="155" height="54" rx="10" fill="#D9EFFF" stroke="#4184F3" stroke-width="2"/>
  <text x="430" y="70" font-size="13" font-family="Arial" fill="#333">Lihat Daftar</text>
  <text x="430" y="87" font-size="13" font-family="Arial" fill="#333">Tarif Sewa</text>
  <!-- End Event -->
  <circle cx="620" cy="75" r="22" stroke="#28A745" stroke-width="5" fill="#fff"/>
  <text x="601" y="80" font-size="11" font-family="Arial" fill="#333">Selesai</text>
  <!-- Arrows -->
  <line x1="72" y1="75" x2="90" y2="75" stroke="#4184F3" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="210" y1="75" x2="240" y2="75" stroke="#4184F3" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="400" y1="75" x2="420" y2="75" stroke="#4184F3" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="575" y1="75" x2="598" y2="75" stroke="#28A745" stroke-width="2" marker-end="url(#arrowhead-end)" />
  <!-- Arrowhead marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#4184F3"/>
    </marker>
    <marker id="arrowhead-end" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#28A745"/>
    </marker>
  </defs>
</svg>
