version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aset_service_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=aset_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
    depends_on:
      - postgres
    networks:
      - aset_network

  postgres:
    image: postgres:16-alpine
    container_name: aset_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aset_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aset_network

  nginx:
    image: nginx:alpine
    container_name: aset_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - aset_network

volumes:
  postgres_data:

networks:
  aset_network:
    driver: bridge
